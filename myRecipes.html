<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Recipes - Measurely</title>
    <link rel="icon" type="image/x-icon" href="/brand/MeasurelyFavicon.ico">
    <link rel="stylesheet" href="css/myRecipes.css">
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <img src="brand/MeasurelyLogo-Color.png" alt="Measurely" class="sidebar-logo">
            <h1>Measurely</h1>
        </div>
        
        <nav class="sidebar-nav">
            <a href="myRecipes.html" class="nav-link active">Recipe Library</a>
            <!-- <a href="recipes.html" class="nav-link">Discover Recipes</a> -->
            <!-- <a href="history.html" class="nav-link">Baking History</a> -->
            <a href="#" class="nav-link">Account</a>
        </nav>

        <div id="active-recipe-section" style="display: none;">
            <p class="sidebar-label">Currently Selected</p>
            <a id="active-recipe-link" href="#" class="active-recipe-card">
                <img id="active-recipe-img" src="" alt="">
                <div class="active-recipe-info">
                    <span id="active-recipe-name"></span>
                </div>
            </a>
        </div>

        <div class="sidebar-footer">
            <p id="welcome-msg">Hi there!</p>
            <button id="btn-logout">Sign Out</button>
        </div>
    </aside>

    <main>
        <header class="content-header">
            <h1>Recipe Library</h1>
        </header>

        <div class="recipe-sections">
            <section class="recipe-section">
                <h2>Cookies</h2>
                <div class="recipe-grid">
                    <div class="recipe-card" data-recipe="TollHouseCookies">
                        <div class="recipe-image">
                            <img src="img/tollhousecookies.jpg" alt="Toll House Chocolate Chip Cookies">
                        </div>
                        <div class="card-content">
                            <h3>Toll House Chocolate Chip Cookies</h3>
                        </div>
                    </div>

                    <div class="recipe-card" data-recipe="SugarCookies">
                        <div class="recipe-image">
                            <img src="img/cookiedemo.jpeg" alt="Sugar Cookies">
                        </div>
                        <div class="card-content">
                            <h3>Sugar Cookies</h3>
                        </div>
                    </div>

                    <div class="recipe-card" data-recipe="PeanutButterCookies">
                        <div class="recipe-image">
                            <img src="img/cookiedemo.jpeg" alt="Peanut Butter Cookies">
                        </div>
                        <div class="card-content">
                            <h3>Peanut Butter Cookies</h3>
                        </div>
                    </div>
                </div>
            </section>

            <section class="recipe-section">
                <h2>Muffins and Bars</h2>
                <div class="recipe-grid">
                    <div class="recipe-card" data-recipe="BlueberryMuffins">
                        <div class="recipe-image">
                            <img src="img/vanillacake.jpg" alt="Blueberry Muffins">
                        </div>
                        <div class="card-content">
                            <h3>Blueberry Muffins</h3>
                        </div>
                    </div>

                    <div class="recipe-card" data-recipe="FudgyBrownies">
                        <div class="recipe-image">
                            <img src="img/fudgybrownies.jpg" alt="Fudgy Brownies">
                        </div>
                        <div class="card-content">
                            <h3>Fudgy Brownies</h3>
                        </div>
                    </div>
                </div>
            </section>

            <section class="recipe-section">
                <h2>Cakes and Loaves</h2>
                <div class="recipe-grid">
                    <div class="recipe-card" data-recipe="Kladdkaka">
                        <div class="recipe-image">
                            <img src="img/vanillacake.jpg" alt="Kladdkaka - Swedish Chocolate Cake">
                        </div>
                        <div class="card-content">
                            <h3>Kladdkaka - Swedish Chocolate Cake</h3>
                        </div>
                    </div>

                    <div class="recipe-card" data-recipe="PoundCake">
                        <div class="recipe-image">
                            <img src="img/vanillacake.jpg" alt="Pound Cake">
                        </div>
                        <div class="card-content">
                            <h3>Pound Cake</h3>
                        </div>
                    </div>

                    <div class="recipe-card" data-recipe="PumpkinBread">
                        <div class="recipe-image">
                            <img src="img/sourdoughbread.jpeg" alt="Pumpkin Bread">
                        </div>
                        <div class="card-content">
                            <h3>Pumpkin Bread</h3>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { 
            getFirestore, 
            doc, 
            onSnapshot 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyC-Rm6at6ir7lRGx2ZpJvHYDtB_Y6JWME0",
            authDomain: "measurely-ctd-capstone.firebaseapp.com",
            databaseURL: "https://measurely-ctd-capstone-default-rtdb.firebaseio.com",
            projectId: "measurely-ctd-capstone",
            storageBucket: "measurely-ctd-capstone.firebasestorage.app",
            messagingSenderId: "130241754874",
            appId: "1:130241754874:web:e201593781a7212e75fb43",
            measurementId: "G-LJ2HBQ144K"
        };

        // 2. Initialize Firebase & Firestore
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 3. DOM Elements
        const welcomeMsg = document.getElementById('welcome-msg');
        const btnLogout = document.getElementById('btn-logout');
        const recipeCards = document.querySelectorAll('.recipe-card');
        const activeSection = document.getElementById('active-recipe-section');
        const activeName = document.getElementById('active-recipe-name');
        const activeImg = document.getElementById('active-recipe-img');
        const activeLink = document.getElementById('active-recipe-link');

        const recipeMap = {
            TollHouseCookies: { id: "TollHouseCookies", name: "Toll House Chocolate Chip Cookies", img: "img/tollhousecookies.jpg" },
            SugarCookies: { id: "SugarCookies", name: "Sugar Cookies", img: "img/cookiedemo.jpeg" },
            PeanutButterCookies: { id: "PeanutButterCookies", name: "Peanut Butter Cookies", img: "img/cookiedemo.jpeg" },
            BlueberryMuffins: { id: "BlueberryMuffins", name: "Blueberry Muffins", img: "img/vanillacake.jpg" },
            FudgyBrownies: { id: "FudgyBrownies", name: "Fudgy Brownies", img: "img/fudgybrownies.jpg" },
            "Fudgy Brownies": { id: "FudgyBrownies", name: "Fudgy Brownies", img: "img/fudgybrownies.jpg" },
            Kladdkaka: { id: "Kladdkaka", name: "Kladdkaka - Swedish Chocolate Cake", img: "img/vanillacake.jpg" },
            PoundCake: { id: "PoundCake", name: "Pound Cake", img: "img/vanillacake.jpg" },
            PumpkinBread: { id: "PumpkinBread", name: "Pumpkin Bread", img: "img/sourdoughbread.jpeg" }
        };

        // 4. Protection & Identity Logic (The Security Guard)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Access Granted:", user.email);
                const userName = user.email.split('@')[0];
                welcomeMsg.innerText = `Hi, ${userName}!`;

                // Reveal the page content
                document.body.style.display = "block";

                // 5. Real-time Firestore Sync for Sidebar Selection
                const userDocRef = doc(db, "users", user.uid);
                onSnapshot(userDocRef, (docSnap) => {
                    if (!activeSection) return;
                    if (docSnap.exists() && docSnap.data().currentSelection) {
                        const selectedRaw = docSnap.data().currentSelection;
                        const selectedId = typeof selectedRaw === "string" ? selectedRaw : selectedRaw.id;
                        const data = recipeMap[selectedId] || { id: selectedId, name: selectedId, img: "" };
                        activeSection.style.display = 'block';
                        if (activeName) activeName.innerText = data.name;
                        if (activeImg) {
                            if (data.img) {
                                activeImg.src = data.img;
                                activeImg.style.display = "block";
                            } else {
                                activeImg.style.display = "none";
                            }
                        }
                        if (activeLink) activeLink.href = `recipes/${encodeURIComponent(data.id)}.html`;
                    }
                });
            } else {
                console.warn("Unauthorized access. Redirecting...");
                window.location.href = 'access.html'; //
            }
        });

        recipeCards.forEach(card => {
            card.addEventListener('click', () => {
                const recipeID = card.getAttribute('data-recipe');
                window.location.href = `recipes/${encodeURIComponent(recipeID)}.html`;
            });
        });

        // 6. Logout Logic
        btnLogout.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = 'access.html';
            } catch (error) {
                console.error("Logout failed:", error);
            }
        });
    </script>
</body>
</html>
