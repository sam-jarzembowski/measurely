<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>My Recipes - Measurely</title>
    <link rel="icon" type="image/x-icon" href="/brand/MeasurelyFavicon.ico">
    <link rel="stylesheet" href="css/myRecipes.css">
</head>
<body>
    <aside>
        <div class="sidebar-header">
            <img src="brand/MeasurelyLogo-Color.png" alt="Measurely" class="sidebar-logo">
            <h1>Measurely</h1>
        </div>
        
        <nav class="sidebar-nav">
            <a href="myRecipes.html" class="nav-link active">My Library</a>
            <a href="browse.html" class="nav-link">Browse Recipes</a>
            <a href="history.html" class="nav-link">Baking History</a>
            <a href="settings.html" class="nav-link">Account</a>
        </nav>

        <div class="sidebar-footer">
            <p id="welcome-msg">Hi, Sam</p>
            <button id="btn-logout">Sign Out</button>
        </div>
    </aside>

    <main>
        <header class="content-header">
            <h1>My Recipes</h1>
            <input type="text" id="recipe-search" placeholder="Search...">
        </header>
        <div id="recipe-grid">
            </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getAuth, 
            onAuthStateChanged, 
            signOut 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 1. Firebase Configuration (Ensure this matches access.html exactly)
        const firebaseConfig = {
            apiKey: "AIzaSyC-Rm6at6ir7lRGx2ZpJvHYDtB_Y6JWME0",
            authDomain: "measurely-ctd-capstone.firebaseapp.com",
            databaseURL: "https://measurely-ctd-capstone-default-rtdb.firebaseio.com",
            projectId: "measurely-ctd-capstone",
            storageBucket: "measurely-ctd-capstone.firebasestorage.app",
            messagingSenderId: "130241754874",
            appId: "1:130241754874:web:e201593781a7212e75fb43",
            measurementId: "G-LJ2HBQ144K"
        };

        // 2. Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 3. DOM Elements
        const welcomeMsg = document.getElementById('welcome-msg');
        const btnLogout = document.getElementById('btn-logout');
        const recipeSearch = document.getElementById('recipe-search');
        const recipeCards = document.querySelectorAll('.recipe-card');

        // 4. Protection & Identity Logic (The Security Guard)
        onAuthStateChanged(auth, (user) => {
            if (user) {
                console.log("Access Granted:", user.email);
                
                // Personalize the greeting
                const userName = user.email.split('@')[0];
                welcomeMsg.innerText = `Hi, ${userName}!`;

                // Reveal the page content
                document.body.style.display = "block";
            } else {
                // Not logged in? Kick them back to the login page
                console.warn("Unauthorized access. Redirecting...");
                window.location.href = 'access.html';
            }
        });

        // 5. Logout Logic
        btnLogout.addEventListener('click', async () => {
            try {
                await signOut(auth);
                window.location.href = 'access.html';
            } catch (error) {
                console.error("Logout failed:", error);
            }
        });

        // 6. Search/Filter Logic
        // This looks at each card and hides it if it doesn't match the search input
        recipeSearch.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            
            recipeCards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                if (title.includes(term)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        });

        // 7. Navigation for "Add New" Button
        document.getElementById('btn-add-new').addEventListener('click', () => {
            // You could point this to a form page or trigger a modal
            alert("This feature will allow you to import new recipes soon!");
        });

    </script>
</body>
</html>
